name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: dotnet publish src/RebootWatch -r win-x64 --self-contained -p:PublishSingleFile=true -c Release -o ./publish

      - name: Zip release
        run: Compress-Archive -Path ./publish/RebootWatch.exe -DestinationPath ./RebootWatch-v${{ github.ref_name }}-win-x64.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./RebootWatch-*.zip
          generate_release_notes: true
